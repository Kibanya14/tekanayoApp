<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe - {{ role }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 65%, #334155 100%); }
    .glass-card { background: rgba(255,255,255,.12); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.25); }
  </style>
</head>
<body class="min-h-screen flex flex-col gradient-bg text-white">
  <main class="flex-1 grid place-items-center p-4">
  <div class="max-w-md w-full">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}<div class="space-y-2 mb-4">{% for c,m in messages %}<div class="rounded-xl border px-4 py-3 {% if c=='error' %}bg-red-900/60 border-red-400 text-red-100{% else %}bg-emerald-900/60 border-emerald-400 text-emerald-100{% endif %}">{{ m }}</div>{% endfor %}</div>{% endif %}
    {% endwith %}
    <section class="glass-card rounded-3xl shadow-2xl p-8">
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-white rounded-full grid place-items-center mx-auto mb-3">
          <i class="fas fa-shield-halved text-blue-700 text-2xl"></i>
        </div>
        <h1 class="text-2xl font-black">Nouveau mot de passe</h1>
        <p class="text-sm opacity-90 mt-1">Espace {{ role }}</p>
      </div>
      <form method="POST" class="mt-4 space-y-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="relative">
          <input id="reset_password" required minlength="6" type="password" name="password" placeholder="Nouveau mot de passe" class="w-full rounded-xl px-4 py-3 pl-11 pr-10 bg-white/10 border border-white/30 placeholder-white/70">
          <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/70"></i>
          <button type="button" id="toggleResetPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/80"><i class="fas fa-eye"></i></button>
        </div>
        <div class="relative">
          <input required minlength="6" type="password" name="confirm_password" placeholder="Confirmer" class="w-full rounded-xl px-4 py-3 pl-11 bg-white/10 border border-white/30 placeholder-white/70">
          <i class="fas fa-check-circle absolute left-4 top-1/2 -translate-y-1/2 text-white/70"></i>
        </div>
        <button class="w-full rounded-xl bg-white text-blue-700 font-bold py-3">Mettre à jour</button>
      </form>
    </section>
  </div>
  </main>
  <footer class="text-center text-white opacity-70 text-xs px-4 mt-auto py-6">
    <p>© Tekanayo App Sécurité, Propulsé par Esperdigi - Tout droit réservé.</p>
  </footer>
  <script>
    const toggleResetPwd = document.getElementById('toggleResetPassword');
    const resetPwd = document.getElementById('reset_password');
    if (toggleResetPwd && resetPwd) {
      toggleResetPwd.addEventListener('click', function() {
        if (resetPwd.type === 'password') {
          resetPwd.type = 'text';
          toggleResetPwd.innerHTML = '<i class="fas fa-eye-slash"></i>';
        } else {
          resetPwd.type = 'password';
          toggleResetPwd.innerHTML = '<i class="fas fa-eye"></i>';
        }
      });
    }
  </script>
</body>
</html>
